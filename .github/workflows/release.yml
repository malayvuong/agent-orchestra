name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Tag or ref to publish from (for example v2026.3.5)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Lint workspace
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Publish @malayvuong/agent-orchestra-shared
        run: node scripts/publish-if-missing.mjs packages/shared https://registry.npmjs.org public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @malayvuong/agent-orchestra-core
        run: node scripts/publish-if-missing.mjs packages/core https://registry.npmjs.org public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @malayvuong/agent-orchestra-providers
        run: node scripts/publish-if-missing.mjs packages/providers https://registry.npmjs.org public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @malayvuong/agent-orchestra-registry
        run: node scripts/publish-if-missing.mjs packages/registry https://registry.npmjs.org public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @malayvuong/agent-orchestra
        run: node scripts/publish-if-missing.mjs apps/cli https://registry.npmjs.org public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://npm.pkg.github.com'
          scope: '@malayvuong'

      - name: Publish @malayvuong/agent-orchestra-shared to GitHub Packages
        run: node scripts/publish-if-missing.mjs packages/shared https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @malayvuong/agent-orchestra-core to GitHub Packages
        run: node scripts/publish-if-missing.mjs packages/core https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @malayvuong/agent-orchestra-providers to GitHub Packages
        run: node scripts/publish-if-missing.mjs packages/providers https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @malayvuong/agent-orchestra-registry to GitHub Packages
        run: node scripts/publish-if-missing.mjs packages/registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @malayvuong/agent-orchestra to GitHub Packages
        run: node scripts/publish-if-missing.mjs apps/cli https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(inputs.release_ref, 'v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
